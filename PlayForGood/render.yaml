services:
  - type: web
    name: playforgood-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: APP_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RAZORPAY_ENABLED
        value: "false"
      - key: APP_CURRENCY
        value: INR
      - key: APP_PRIZE_POOL_PERCENT
        value: "60"
      - key: APP_MIN_CHARITY_PERCENT
        value: "10"
